<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - MEDIK-PLUS PHARMACY</title>
    <meta name="description" content="Create a new staff account for MEDIK-PLUS PHARMACY internal management system.">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

    <!-- Animated Background Canvas -->
    <canvas id="lightning-canvas"></canvas>

    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Logo -->
            <a href="index.html" class="auth-logo" id="auth-logo">
                <div class="auth-logo-cross">
                    <i class="ti ti-plus"></i>
                </div>
                <div class="auth-logo-text">
                    MEDIK-PLUS
                    <span>PHARMACY</span>
                </div>
            </a>

            <h1 class="auth-heading">Create Account</h1>
            <p class="auth-subheading">Register a new staff portal account</p>

            <!-- Alert -->
            <div class="auth-alert error" id="signup-alert" role="alert"></div>
            <div class="auth-alert success" id="signup-success-alert" role="alert"></div>

            <!-- Signup Form -->
            <form id="signup-form" novalidate>

                <div class="auth-form-group">
                    <label for="signup-name">Full Name</label>
                    <input
                        type="text"
                        id="signup-name"
                        class="auth-input"
                        placeholder="Dr. Jane Smith"
                        autocomplete="name"
                        required
                    >
                    <span class="auth-field-error" id="signup-name-error">Full name is required.</span>
                </div>

                <div class="auth-form-group">
                    <label for="signup-email">Email Address</label>
                    <input
                        type="email"
                        id="signup-email"
                        class="auth-input"
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                    >
                    <span class="auth-field-error" id="signup-email-error">Please enter a valid email address.</span>
                </div>

                <div class="auth-form-group">
                    <label for="signup-role">Role</label>
                    <select id="signup-role" class="auth-input" required>
                        <option value="" disabled selected>Select your role</option>
                        <option value="Admin">Admin</option>
                        <option value="Pharmacist">Pharmacist</option>
                        <option value="Dispenser">Dispenser</option>
                        <option value="Store Manager">Store Manager</option>
                    </select>
                    <span class="auth-field-error" id="signup-role-error">Please select a role.</span>
                </div>

                <div class="auth-form-group">
                    <label for="signup-password">Password</label>
                    <div class="auth-input-wrapper">
                        <input
                            type="password"
                            id="signup-password"
                            class="auth-input"
                            placeholder="Create a strong password"
                            autocomplete="new-password"
                            required
                        >
                        <button type="button" class="password-toggle-btn" id="toggle-signup-password" aria-label="Toggle password visibility">
                            <i class="ti ti-eye" id="toggle-signup-icon"></i>
                        </button>
                    </div>
                    <!-- Strength Indicator -->
                    <div class="strength-bar-wrapper">
                        <div class="strength-bar-track">
                            <div class="strength-bar-fill" id="strength-bar"></div>
                        </div>
                        <p class="strength-label" id="strength-label">Enter a password</p>
                    </div>
                    <span class="auth-field-error" id="signup-password-error">Password must be at least 8 characters.</span>
                </div>

                <div class="auth-form-group">
                    <label for="signup-confirm">Confirm Password</label>
                    <div class="auth-input-wrapper">
                        <input
                            type="password"
                            id="signup-confirm"
                            class="auth-input"
                            placeholder="Re-enter your password"
                            autocomplete="new-password"
                            required
                        >
                        <button type="button" class="password-toggle-btn" id="toggle-confirm-password" aria-label="Toggle confirm password visibility">
                            <i class="ti ti-eye" id="toggle-confirm-icon"></i>
                        </button>
                    </div>
                    <span class="auth-field-error" id="signup-confirm-error">Passwords do not match.</span>
                </div>

                <button type="submit" class="auth-btn" id="signup-submit-btn">
                    <i class="ti ti-user-plus"></i> Create Account
                </button>

                <div class="auth-links-row">
                    Already have an account? <a href="login.html" id="link-to-login">Sign in</a>
                </div>

            </form>

            <div class="auth-back-link">
                <a href="index.html" id="signup-back-home">
                    <i class="ti ti-arrow-left"></i> Back to website
                </a>
            </div>

        </div>
    </div>

    <script src="assets/js/lightning-bg.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            initSignupPage();
        });
    </script>
</body>
</html>
