<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - MEDIK-PLUS PHARMACY</title>
    <meta name="description" content="Reset your MEDIK-PLUS PHARMACY account password.">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

    <!-- Animated Background Canvas -->
    <canvas id="lightning-canvas"></canvas>

    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Logo -->
            <a href="index.html" class="auth-logo" id="auth-logo">
                <div class="auth-logo-cross">
                    <i class="ti ti-plus"></i>
                </div>
                <div class="auth-logo-text">
                    MEDIK-PLUS
                    <span>PHARMACY</span>
                </div>
            </a>

            <h1 class="auth-heading">Reset Password</h1>
            <p class="auth-subheading">Enter your email to receive a reset link</p>

            <!-- Forgot Password Form -->
            <form id="forgot-form" novalidate>

                <div class="auth-form-group">
                    <label for="forgot-email">Email Address</label>
                    <input
                        type="email"
                        id="forgot-email"
                        class="auth-input"
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                    >
                    <span class="auth-field-error" id="forgot-email-error">Please enter a valid email address.</span>
                </div>

                <button type="submit" class="auth-btn" id="forgot-submit-btn">
                    <i class="ti ti-send"></i> Send Reset Link
                </button>

                <div class="auth-links-row">
                    Remembered it? <a href="login.html" id="link-forgot-to-login">Sign in</a>
                </div>

            </form>

            <!-- Confirmation Panel -->
            <div class="auth-success-panel" id="forgot-success-panel">
                <i class="ti ti-mail-check"></i>
                <h3 style="font-family:'Raleway',sans-serif; color:#F0F4F8; margin-bottom:0.75rem; font-size:1.2rem;">Check Your Inbox</h3>
                <p>If this email is registered, a reset link has been sent. Please check your inbox and follow the instructions.</p>
                <div style="margin-top:1.5rem;">
                    <a href="login.html" class="auth-btn" style="text-decoration:none; display:inline-flex; align-items:center; gap:0.5rem; width:auto; padding:0.75rem 2rem;">
                        <i class="ti ti-arrow-left"></i> Back to Login
                    </a>
                </div>
            </div>

            <div class="auth-back-link">
                <a href="index.html" id="forgot-back-home">
                    <i class="ti ti-arrow-left"></i> Back to website
                </a>
            </div>

        </div>
    </div>

    <script src="assets/js/lightning-bg.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            initForgotPasswordPage();
        });
    </script>
</body>
</html>
