<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MEDIK-PLUS PHARMACY</title>
    <meta name="description" content="Log in to your MEDIK-PLUS PHARMACY account to manage bookings, products, and pharmacy operations.">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>
<body>

    <!-- Animated Background Canvas -->
    <canvas id="lightning-canvas"></canvas>

    <div class="auth-wrapper">
        <div class="auth-card">

            <!-- Logo -->
            <a href="index.html" class="auth-logo" id="auth-logo">
                <div class="auth-logo-cross">
                    <i class="ti ti-plus"></i>
                </div>
                <div class="auth-logo-text">
                    MEDIK-PLUS
                    <span>PHARMACY</span>
                </div>
            </a>

            <h1 class="auth-heading">Welcome Back</h1>
            <p class="auth-subheading">Sign in to your pharmacy account</p>

            <!-- Alert -->
            <div class="auth-alert error" id="login-alert" role="alert"></div>

            <!-- Login Form -->
            <form id="login-form" novalidate>

                <div class="auth-form-group">
                    <label for="login-email">Email Address</label>
                    <input
                        type="email"
                        id="login-email"
                        class="auth-input"
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                    >
                    <span class="auth-field-error" id="login-email-error">Please enter a valid email address.</span>
                </div>

                <div class="auth-form-group">
                    <label for="login-password">Password</label>
                    <div class="auth-input-wrapper">
                        <input
                            type="password"
                            id="login-password"
                            class="auth-input"
                            placeholder="Your password"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="password-toggle-btn" id="toggle-login-password" aria-label="Toggle password visibility">
                            <i class="ti ti-eye" id="toggle-login-icon"></i>
                        </button>
                    </div>
                    <span class="auth-field-error" id="login-password-error">Password is required.</span>
                </div>

                <div class="auth-checkbox-row">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me">Remember me on this device</label>
                </div>

                <button type="submit" class="auth-btn" id="login-submit-btn">
                    <i class="ti ti-login"></i> Sign In
                </button>

                <div class="auth-links-row">
                    Forgot your password? <a href="forgot-password.html" id="link-forgot-password">Reset it here</a>
                </div>
                <div class="auth-links-row">
                    No account yet? <a href="signup.html" id="link-to-signup">Create one</a>
                </div>

            </form>

            <div class="auth-back-link">
                <a href="index.html" id="login-back-home">
                    <i class="ti ti-arrow-left"></i> Back to website
                </a>
            </div>

        </div>
    </div>

    <script src="assets/js/lightning-bg.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            initLoginPage();
        });
    </script>
</body>
</html>
